<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 700 700" width="100%" height="100%">
  <defs>
    <filter id="grainyNoise" x="0%" y="0%" width="100%" height="100%" filterUnits="objectBoundingBox" primitiveUnits="userSpaceOnUse" color-interpolation-filters="linearRGB">
      <feTurbulence type="turbulence" baseFrequency="0.35" numOctaves="4" seed="15" stitchTiles="stitch" x="0%" y="0%" width="100%" height="100%" result="turbulence" />
      <feSpecularLighting surfaceScale="15" specularConstant="0.75" specularExponent="20" lighting-color="#ffffff" x="0%" y="0%" width="100%" height="100%" in="turbulence" result="specularLighting">
        <feDistantLight azimuth="3" elevation="100" />
      </feSpecularLighting>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="transparent" />
  <rect width="100%" height="100%" fill="#ffffff" filter="url(#grainyNoise)" />
</svg>
